# MotoTap static site, fronted by snipeit's existing Caddy.
#
# The container has no host ports and no TLS -- snipeit's Caddy terminates
# HTTPS and reverse-proxies mototap.co.ke to this container over the shared
# snipeit network. So this joins snipeit's default network as external.
#
# Bring snipeit up first (it creates `snipeit_default`).

networks:
  snipeit_default:
    external: true

services:
  mototap:
    build:
      context: .
      args:
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_CLOUDINARY_UPLOAD_MODE: ${VITE_CLOUDINARY_UPLOAD_MODE:-unsigned}
        VITE_CLOUDINARY_CLOUD_NAME: ${VITE_CLOUDINARY_CLOUD_NAME}
        VITE_CLOUDINARY_PRESET_PROFILE_PHOTOS: ${VITE_CLOUDINARY_PRESET_PROFILE_PHOTOS}
        VITE_CLOUDINARY_PRESET_SIGNUP_DOCUMENTS: ${VITE_CLOUDINARY_PRESET_SIGNUP_DOCUMENTS}
        VITE_CLOUDINARY_PRESET_VEHICLES: ${VITE_CLOUDINARY_PRESET_VEHICLES}
        VITE_CLOUDINARY_PRESET_USER_UPLOADS: ${VITE_CLOUDINARY_PRESET_USER_UPLOADS}
        VITE_CLOUDINARY_UPLOAD_PRESET: ${VITE_CLOUDINARY_UPLOAD_PRESET:-}
    image: mototap-web
    container_name: mototap-web
    restart: unless-stopped
    networks:
      - snipeit_default
    expose:
      - "80"
